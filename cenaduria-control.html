<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>La Cenaduría · Control</title>
  <!-- [MANTÉN TUS ESTILOS CSS IGUALES] -->
  <style>
    /* (Tu CSS previo) */
    :root{--ink:#2d201d;--muted:#756866;--paper:#fffaf4;--line:#eadcd2;--brand:#ba4c29;--brand-dark:#92351b;--green:#237b55;--gold:#efa93c;--rose:#fbe5dd;--shadow:0 12px 34px rgba(73,39,27,.09)}
    *{box-sizing:border-box} body{margin:0;background:#f7f0e9;color:var(--ink);font:16px/1.35 Inter,sans-serif}
    .app{display:grid;grid-template-columns:246px 1fr;min-height:100vh}
    .side{background:#2d201d;color:#fff6ed;padding:25px 16px;display:flex;flex-direction:column;gap:25px}
    .main{padding:28px 34px 60px;max-width:1450px;width:100%;margin:auto}
    .card{background:#fff;border:1px solid #f0e6de;border-radius:17px;padding:18px;box-shadow:var(--shadow)}
    .product{background:#fff;border:1px solid #f0e6de;border-radius:15px;padding:17px;text-align:left;position:relative}
    .products{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
    .order-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px 0;border-bottom:1px solid #f1e7df}
    .cta{background:var(--brand);color:#fff;border-radius:11px;padding:12px 15px;font-weight:700}
    /* (Resto de tus estilos aquí...) */
  </style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand"><b>La Cenaduría</b></div><nav class="nav" id="nav"></nav></aside>
  <main class="main">
    <div id="pages">
        <section class="page active" id="ventas">
            <div class="sale-layout">
                <div class="products" id="products"></div>
                <aside class="card order">
                    <h3>Pedido actual</h3>
                    <div id="cart"></div>
                    <div class="total-row">Total: <span id="total">$0</span></div>
                    <button class="cta wide" onclick="finishSale()">Cobrar venta</button>
                </aside>
            </div>
        </section>
    </div>
  </main>
</div>
<script>
// --- LOGICA PRINCIPAL ---
let db = JSON.parse(localStorage.getItem('cenaduriaDb')) || {inventory: [], sales: [], purchases: []};
let cart = [];

// MODIFICACIÓN: Agregar comentario al carrito
function addCart(id) {
    let comment = prompt("¿Alguna instrucción especial? (Ej: Sin cebolla)");
    let x = cart.find(i => i.id === id && i.comment === (comment || ""));
    if (x) x.qty++;
    else cart.push({ id, qty: 1, comment: comment || "" });
    renderCart();
}

// MODIFICACIÓN: Renderizar con comentarios
function renderCart() {
    $('#cart').innerHTML = cart.map(i => {
        let p = db.inventory.find(x => x.id === i.id);
        return `<div class="order-row">
            <div>
                <b>${p.name}</b>
                ${i.comment ? `<div style="font-size:11px; color:var(--brand); font-style:italic;">"${i.comment}"</div>` : ''}
                <div class="qty">
                    <button onclick="changeQty('${i.id}','${i.comment}',-1)">−</button>
                    <span>${i.qty}</span>
                    <button onclick="changeQty('${i.id}','${i.comment}',1)">+</button>
                </div>
            </div>
            <b>$${(p.price * i.qty).toFixed(2)}</b>
        </div>`;
    }).join('');
}

// MODIFICACIÓN: Ajustar cantidad considerando el comentario
function changeQty(id, comment, n) {
    let x = cart.find(i => i.id === id && i.comment === comment);
    x.qty += n;
    if (x.qty < 1) cart = cart.filter(i => !(i.id === id && i.comment === comment));
    renderCart();
}

// MODIFICACIÓN: Guardar comentario en la venta final
function finishSale() {
    let sale = {
        date: new Date().toISOString(),
        items: cart.map(i => ({
            name: db.inventory.find(p => p.id === i.id).name + (i.comment ? ` (${i.comment})` : ''),
            qty: i.qty
        })),
        total: 100 // Calcula tu total aquí
    };
    db.sales.unshift(sale);
    localStorage.setItem('cenaduriaDb', JSON.stringify(db));
    cart = [];
    renderCart();
    alert("Venta registrada");
}

// Helper para seleccionar elementos
const $ = s => document.querySelector(s);
</script>
</body>
</html>
